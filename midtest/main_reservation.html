<!doctype html>
<html lang="zh-TW">

<head>

  <link rel="stylesheet" href="./css/bootstrap.css" />

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
      aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navList navbar-nav">
        <li class="nav-item">
          <a class="nav-link" href="#"><i class="bi bi-briefcase-fill"></i> 服務內容</a>

        <li class="nav-item">

        <li class="nav-item">
          <a class="nav-link" href="#"><i class="bi bi-pencil-square"></i> 常見問題</a>
        </li>
      </ul>
    </div>
  </div>

  <div class="container-fluid">
    <div id="carouselExampleIndicators" class="carousel slide carousel-fade" data-bs-ride="carousel"
      data-bs-interval="3000">
      <div class="carousel-indicators">
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"
          aria-current="true" aria-label="Slide 1"></button>
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"
          aria-label="Slide 2"></button>
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"
          aria-label="Slide 3"></button>
      </div>
      <div class="carousel-inner container-sm">
        <div class="carousel-item active">
          <img src="./images/pexels-arina-krasnikova-7726077.jpg" class="d-block" alt="room  picture" />
        </div>
        <div class="carousel-item">
          <img src="./images/pexels-arina-krasnikova-7726090.jpg" class="d-block" alt="room  picture" />
        </div>
        <div class="carousel-item">
          <img src="./images/pexels-arina-krasnikova-7726315.jpg" class="d-block" alt="room  picture" />
        </div>
      </div>
    </div>

  <div class="Resr container container-fluid">
    <div class="reser mt-5 ">
      <label for="exampleFormControlInput1" class="form-label">您的信箱：</label>
      <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="name@example.com">
    </div>
    <div class="reser mt-3 mb-3">
      <label for="exampleFormControlTextarea1" class="form-label">預約參觀/提問：</label>
      <textarea class="form-control" id="exampleFormControlTextarea1" rows="10"></textarea>
    </div>
    <div class="sub mb-5">
    <button id="resSub" type="submit" class="btn btn-secondary btn-sm">送出</button>
    </div>
  </div>

  <footer>

    <section class="foot">

      </h5>
    </section>
    <section class="links">

      <a href="https://www.instagram.com"><i class="bi bi-instagram"></i></a>

      </p>
      <p>地址：台中市南屯區公益路二段</p>
